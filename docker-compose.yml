services:
  sieve-backend:
    build: ./backend
    container_name: sieve-backend
    environment:
      - SPOTIFY_CLIENT_ID=${SPOTIFY_CLIENT_ID}
      - SPOTIFY_CLIENT_SECRET=${SPOTIFY_CLIENT_SECRET}
      - SPOTIFY_REDIRECT_URI=${SPOTIFY_REDIRECT_URI}
      - FLASK_SECRET_KEY=${FLASK_SECRET_KEY}
      - AUTH_SUCCESS_REDIRECT=${AUTH_SUCCESS_REDIRECT:-/}
      - FRONTEND_ORIGIN=${FRONTEND_ORIGIN:-https://sieve.emlw.dev}
      - SESSION_COOKIE_SECURE=${SESSION_COOKIE_SECURE:-true}
      - SPOTIFY_TIMEOUT=${SPOTIFY_TIMEOUT:-12}
    networks:
      - web

  sieve-frontend:
    build: ./frontend
    container_name: sieve-frontend
    depends_on:
      - sieve-backend
    networks:
      - web

networks:
  web:
    external: true
